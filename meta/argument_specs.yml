---
argument_specs:
  main:
    author: Niclas Spreng
    description: Manage custom system login banner.
    short_description: banner
    options:
      banner_issue_template:
        type: str
        required: true
        description: This content can be customized by providing your own template.
      banner_issue_description:
        type: str
        required: false
        description: Default description for the banner template (only used in default template).
      banner_motd_template:
        type: str
        required: true
        description: Define the custom content for the Linux message of the day.
